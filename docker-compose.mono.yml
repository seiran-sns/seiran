name: seiran

# ─────────────────────────────────────────────────────────────────────────────
# 【小規模／単一コンテナ構成】
# 統合バイナリ seiran-server を引数なし（role=all）で1コンテナ起動し、
# api / federation / worker / firehose を1プロセスで同時に動かす。
#
# 起動:
#   docker compose -f docker-compose.mono.yml up -d
#
# ロールを分離してスケールさせたい場合は docker-compose.yml を使うこと。
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 20

  # ─── seiran-server (全ロールを1プロセスで実行) ─────────────────────────────
  # command 未指定 → Dockerfile の CMD ["seiran-server"] → role=all。
  seiran-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: seiran-server:latest
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - config-data:/app/config
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ─── フロントエンド (Vite dev server) ────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: ../docker/Dockerfile.frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    networks:
      - internal

  # ─── Nginx (リバースプロキシ / ロードバランサー) ─────────────────────────
  # seiran-server コンテナの起動・終了を docker-gen が検知し、
  # nginx に SIGHUP を送って Docker DNS を再解決させる。
  # `docker compose up --scale seiran-server=N` でバックエンドを増減できる。
  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./docker/nginx.mono.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - seiran-server
      - frontend
    networks:
      - internal
      - external

  # seiran-server の起動/終了を検知して nginx を reload するウォッチャー
  docker-gen:
    image: nginxproxy/docker-gen:latest
    restart: always
    command: -notify-sighup seiran-nginx-1 -watch /etc/docker-gen/templates/reload.tmpl /tmp/trigger
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/reload.tmpl:/etc/docker-gen/templates/reload.tmpl:ro
    depends_on:
      - nginx
    networks:
      - internal

  # ─── Cloudflare Tunnel ────────────────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - external

networks:
  internal:
  external:

volumes:
  db-data:
  config-data:
