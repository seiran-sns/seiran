name: seiran

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 20

  # ─── seiran-api (REST API / 認証 / タイムライン) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - config-data:/app/config
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ─── seiran-federation-inbox (AP Inbox / Webfinger) ─────────────────────
  federation-inbox:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: federation-inbox
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - config-data:/app/config
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ─── seiran-federation-worker (バックグラウンドジョブ実行) ───────────────
  # 注意: 現在 InMemoryJobQueue を使用。api / federation-inbox とキューを共有しないため
  # Phase 8 (Redis 統合) までは独立した処理のみ実行する。
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - config-data:/app/config
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ─── seiran-atp-repo (Bluesky Firehose リスナー) ─────────────────────────
  atp-repo:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: atp-repo
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ─── フロントエンド (Vite dev server) ────────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend-modules:/app/node_modules
    networks:
      - internal

  # ─── Nginx (リバースプロキシ) ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - federation-inbox
      - frontend
    networks:
      - internal
      - external

  # ─── Cloudflare Tunnel ────────────────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - external

networks:
  internal:
    internal: true   # DB・各サービスは外部から直接アクセス不可
  external:          # nginx ↔ tunnel 間のみ

volumes:
  db-data:
  config-data:       # secrets.toml の永続化（全バックエンドサービスで共有）
  frontend-modules:  # node_modules をコンテナ内に保持（ホストとは分離）
