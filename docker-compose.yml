name: seiran

# ─────────────────────────────────────────────────────────────────────────────
# 【大規模／ロール分離構成】
# 統合バイナリ seiran-server を --role 違いで複数コンテナ起動し、
# ワーカーや Firehose を API から独立させて負荷分散する。
#
# 小規模・単一コンテナで運用したい場合は docker-compose.mono.yml を使うこと:
#   docker compose -f docker-compose.mono.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

# 全バックエンドコンテナで共有するビルド・環境定義（同一イメージを役割違いで使う）
#
# REDIS_URL: この大規模構成は api / federation / worker が別コンテナのため、
# ジョブキューをプロセス間で共有するには Redis が必須（未設定だと各コンテナが
# 孤立した InMemoryJobQueue を持ち、他コンテナの Worker にジョブが届かない）。
# モノリスモード（docker-compose.mono.yml）には Redis サービス自体が無い
# （同一プロセス内で完結するため不要。`docs/`「キューバックエンド選択方針」参照）。
x-seiran-backend: &seiran-backend
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: seiran-server:latest
  restart: always
  env_file: .env
  environment:
    DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    REDIS_URL: redis://redis:6379
  volumes:
    - config-data:/app/config
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - internal

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 20

  # ─── Redis（split-role構成のジョブキュー共有用）───────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 20

  # ─── api ロール (REST API / 認証 / タイムライン / XRPC) ────────────────────
  api:
    <<: *seiran-backend
    command: ["seiran-server", "--role", "api"]

  # ─── federation ロール (AP Inbox / Webfinger / Actor / Outbox) ─────────────
  federation-inbox:
    <<: *seiran-backend
    command: ["seiran-server", "--role", "federation"]

  # ─── worker ロール (バックグラウンドジョブ実行) ─────────────────────────────
  # Redis バックエンドで api / federation とキューを共有する（RedisJobQueue）。
  worker:
    <<: *seiran-backend
    command: ["seiran-server", "--role", "worker"]

  # ─── firehose ロール (Bluesky Firehose リスナー) ───────────────────────────
  atp-repo:
    <<: *seiran-backend
    command: ["seiran-server", "--role", "firehose"]

  # ─── フロントエンド (Vite dev server) ────────────────────────────────────
  # node_modules はイメージビルド時にインストール済み。
  # ソースファイルだけマウントして HMR を有効にする。
  frontend:
    build:
      context: frontend
      dockerfile: ../docker/Dockerfile.frontend
    env_file: .env
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    networks:
      - internal

  # ─── Nginx (リバースプロキシ / ロール分離ルーティング) ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - federation-inbox
      - frontend
    networks:
      - internal
      - external

  # ─── Cloudflare Tunnel ────────────────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - external

networks:
  internal: # サービス間通信用（ポート非公開のためDB等は外部から届かない）
  external: # nginx ↔ tunnel 間のみ

volumes:
  db-data:
  config-data: # secrets.toml の永続化（全バックエンドサービスで共有）
  redis-data: # ジョブキューの永続化（AOF等はredis:7-alpineのデフォルト設定に従う）
